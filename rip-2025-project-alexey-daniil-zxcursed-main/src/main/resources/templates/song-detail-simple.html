<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="${song.title} + ' - ZXC CURSED'">Song</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background: #f5f5f5; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; }
        .song-title { text-align: center; color: #333; margin-bottom: 10px; }
        .lyrics { white-space: pre-line; line-height: 1.6; margin: 20px 0; }
        .comments { margin-top: 30px; }
        .comment { border-left: 3px solid #667eea; padding: 10px; margin: 10px 0; background: #f8f9fa; }
    </style>
</head>
<body>
<div class="container">
    <h1 class="song-title" th:text="${song.title}">Song Title</h1>

    <div class="lyrics" th:text="${song.lyrics}">Lyrics will appear here</div>

    <div class="comments">
        <h3>Comments</h3>
        <div th:each="comment : ${comments}" class="comment">
            <strong th:text="${comment.user.username}">User</strong> -
            <span th:text="${comment.createdAt}">Date</span>
            <p th:text="${comment.text}">Comment text</p>
        </div>
        <div th:if="${comments == null || comments.empty}">
            <p>No comments yet.</p>
        </div>
    </div>

    <a href="/">Back to Home</a>
</div>
</body>
</html>
